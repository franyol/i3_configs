# Separator
separator=false
separator_block_width=15

# 🕒 Date and Time
[time]
command=date '+🕒 %Y-%m-%d %H:%M:%S'
interval=1

# 🔋 Battery
[battery]
command=~/.config/i3/battery.sh
interval=30

# ⚡ CPU Usage
[cpu]
command=top -bn1 | grep 'Cpu(s)' | awk '{print "⚡ " $2 + $4"%"}'
interval=5

# 🖥️ Memory Usage
[mem]
command=free -h | awk '/Mem:/ {print "🖥️ " $3 "/" $2}'
interval=5

# 💾 Disk Usage
[disk]
command=df -h / | awk 'NR==2 {print "💾 " $3 "/" $2}'
interval=60

# 🔊 Volume
[volume]
command=~/.config/i3/volume.sh
interval=2

# 🌍 Network
[network]
command=nmcli -t -f active,ssid dev wifi | awk -F':' '$1 == "yes" {print "🌍 " $2}'
interval=5

# 👁️ Eye Saver
[eyesaver]
command=~/.config/i3/eyesaver.sh
interval=once
signal=10
